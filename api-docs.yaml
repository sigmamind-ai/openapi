          format: int64
        totalPages:
          type: integer
          format: int32
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean

    # Phone Number APIs Schemas
    CreatePhoneNumberRequest_Telephony:
      type: object
      properties:
        friendlyName:
          maxLength: 128
          minLength: 0
          type: string
          description: A user-friendly label for the phone number.
          example: My Phone Number
        countryCode:
          pattern: "^[A-Z]{2}$"
          type: string
          description: "ISO 3166-1 alpha-2 country code (e.g. 'US', 'IN'). Required\
            \ if phoneNumber is not provided."
          example: US
        areaCode:
          maximum: 99999
          minimum: 100
          type: integer
          description: Area/region code within the specified country for number selection.
          format: int32
          example: 415
        phoneNumber:
          pattern: "^\\+[1-9][0-9]{6,14}$"
          type: string
          description: "The exact phone number to purchase in E.164 format. If omitted,\
            \ a number is auto-selected based on countryCode and areaCode."
          example: "+14155552671"
        inboundAgentId:
          maxLength: 64
          minLength: 0
          type: string
          description: The inbound AI agent ID to associate with this phone number.
          example: awTw7UKhOsLGiDbt
        outboundAgentId:
          maxLength: 64
          minLength: 0
          type: string
          description: The outbound AI agent ID to associate with this phone number.
          example: awTw7UKhOsLGiDbt
        outboundPhoneNumber:
          pattern: "^\\+[1-9][0-9]{6,14}$"
          type: string
          description: "The outbound phone number in E.164 format, used for test calls."
          example: "+14155552671"
    ImportPhoneNumberRequest_Byo:
      required:
      - phoneNumber
      - terminationSipURI
      - trunkPassword
      - trunkUsername
      type: object
      properties:
        friendlyName:
          maxLength: 128
          minLength: 0
          type: string
          description: A user-friendly label for the phone number.
          example: My Phone Number
        phoneNumber:
          pattern: "^\\+[1-9][0-9]{6,14}$"
          type: string
          description: The phone number in E.164 format. Required when importing your
            own number.
          example: "+14155552671"
        inboundAgentId:
          maxLength: 64
          minLength: 0
          type: string
          description: The inbound AI agent ID to associate with this phone number.
          example: awTw7UKhOsLGiDbt
        outboundAgentId:
          maxLength: 64
          minLength: 0
          type: string
          description: The outbound AI agent ID to associate with this phone number.
          example: awTw7UKhOsLGiDbt
        trunkUsername:
          maxLength: 128
          minLength: 0
          type: string
          description: The trunk username for outbound calls. Must be set up in your
            provider account.
          example: username
        trunkPassword:
          maxLength: 128
          minLength: 0
          type: string
          description: The trunk password for outbound calls. Must be set up in your
            provider account.
          example: password
        terminationSipURI:
          maxLength: 253
          minLength: 0
          type: string
          description: "The SIP URI for terminating calls, provided by the telecom\
            \ provider."
          example: sip.telnyx.com
        outboundPhoneNumber:
          pattern: "^\\+[1-9][0-9]{6,14}$"
          type: string
          description: "The outbound phone number in E.164 format, used for test calls."
          example: "+14155552671"
    PhoneNumberResponse:
      type: object
      properties:
        sipPhoneNumber:
          type: string
          description: The caller’s phone number in E.164 format. This number must
            be obtained from SigmaMind or configured using SIP trunking with SigmaMind.
          example: "+14155552671"
        provider:
          type: string
          description: The service provider associated with the phone number.
          example: twilio
          enum:
          - twilio
          - telnyx
          - byo
        inboundAgentId:
          type: string
          description: Default agent ID assigned to handle inbound calls for this
            phone number.
          example: D5D0p7TUs66TTAEAx
        outboundAgentId:
          type: string
          description: Default agent ID assigned to handle outbound calls for this
            phone number.
          example: D5D0p7TUs66TTAEAx
        outboundPhoneNumber:
          type: string
          description: "The default outbound phone number of the callee, represented\
            \ in E.164 format"
          example: "+14155552671"
        active:
          type: boolean
          description: Indicates whether the phone number is currently active and
            available for use.
          example: true
        terminationSipURI:
          type: string
          description: "The SIP URI of the phone number, provided by the service provider\
