          - prompt
        welcomeMessage:
          type: string
          description: "The content of the welcome message. If 'welcomeMessageType'\
            \ is 'static', this contains the exact message shown to the user. If it\
            \ is 'prompt', this contains the prompt used to generate the welcome message\
            \ dynamically."
          example: Welcome to our service! How can I assist you today?
        agentSettings:
          $ref: '#/components/schemas/UpdateAgentSettingsRequest'
    UpdateAgentSettingsRequest:
      type: object
      properties:
        language:
          type: string
          description: The language your customers will primarily speak during calls.
          example: en_US
          default: en_US
          enum:
          - multi_nova3
          - multi_nova2
          - en
          - en_US
          - en_AU
          - en_GB
          - en_NZ
          - en_IN
          - hi
          - de
          - de_CH
          - nl
          - sv
          - sv_SE
          - da
          - da_DK
          - es
          - es_419
          - fr
          - fr_CA
          - pt
          - pt_BR
          - pt_PT
          - it
          - tr
          - no
          - id
          - bg
          - ca
          - zh
          - zh_CN
          - zh_Hans
          - zh_TW
          - zh_Hant
          - zh_HK
          - cs
          - et
          - fi
          - nl_BE
          - el
          - hu
          - ja
          - ko
          - ko_KR
          - lv
          - lt
          - ms
          - pl
          - ro
          - ru
          - sk
          - th
          - th_TH
          - uk
          - vi
        aiStartsConversation:
          type: boolean
          description: "If true the AI agent will initiate the conversation immediately\
            \ when the call connects. If false the call will connect silently, waiting\
            \ for the customer to speak first before the AI responds"
          example: true
          default: true
        backgroundSound:
          type: string
          description: Add ambient background audio during the call.
          example: keyboard_typing
          default: none
          enum:
          - keyboard_typing
          - office_ambience
          - none
        interruptionSensitivity:
          maximum: 1.0
          exclusiveMaximum: false
          minimum: 0.01
          exclusiveMinimum: false
          type: number
          description: "Controls how sensitive the speech output is to user interruptions.\
            \ Lower values make the agent less likely to stop speaking when interrupted,\
            \ while higher values make it more responsive to interruptions."
          format: double
          example: 0.05
          default: 0.05
        globalPrompt:
          type: string
          description: "A global system prompt that is applied to every conversation\
            \ to define the agent’s overall behavior, tone, and constraints."
          example: You are a professional virtual assistant. Always respond politely
            and keep answers concise.
        endCallOnSilenceDuration:
          maximum: 30
          minimum: 1
          type: number
          description: Specifies the duration of continuous silence (in minutes) after
            which the call will be automatically ended.
          format: float
          example: 30
          default: 5
        maxCallDuration:
          maximum: 120
          minimum: 1
          type: integer
          description: Maximum call duration in minutes before the call is automatically
            terminated.
          format: int32
          example: 40
          default: 60
        llmModel:
          type: string
          description: The language model that powers the AI's responses.
          example: gpt-4o-mini
          default: gpt-4o-mini
        voiceId:
          type: string
          description: This is the AI's speaking voice id.
          example: elevenlabs_SGbOfpm28edC83pZ9iGb
          default: elevenlabs_EXAVITQu4vr4xnSDxMaL
        voiceModelId:
          type: string
          description: This is the AI's text to speech engine version.
          example: eleven_turbo_v2_5
          default: eleven_turbo_v2_5
        enablePostConversationInsights:
          type: boolean
          description: Indicates whether post-conversation analysis should be performed
            to extract insights after the conversation ends.
          example: true
          default: false
        postConversationInsightsLlmModel:
          type: string
          description: The language model that powers the AI's post-conversation analysis.
          example: gpt-4o-mini
          default: gpt-4o-mini
        webhooks:
          type: array
          items:
            $ref: '#/components/schemas/WebhookConfigUpdateRequest'
        postConversationInsights:
          type: array
          items:
            $ref: '#/components/schemas/PostConversationInsightsRequest'
    WebhookConfigUpdateRequest:
      required:
      - name
      - secret
      - url
      type: object
      properties:
        webhookId:
          type: string
          description: A unique identifier for the webhook.
          example: wh_BUbkx3PsbzQm5V10
        name:
          type: string
          description: The display name of the webhook for easy identification.
          example: My Webhook
        url:
          pattern: https?://.+
          type: string
          description: The HTTPS endpoint to which the webhook payload will be sent.
            Must be a valid HTTPS URL.
          example: https://example.com/webhook
        secret:
          type: string
          description: Secret key used to authenticate webhook payloads. This key
            should be securely stored and verified on the receiving server.
          example: key_S7ULC2lBwbg.85ez_yKnXTG6I5OgDHwTBNMSOD2ZyyUFUuDgweVXcXE
        events:
          uniqueItems: true
          type: array
          description: List of events that will trigger the webhook. Each event name
            corresponds to a specific type of activity in the system.
          items:
            type: string
            enum:
            - conversation_started
            - conversation_ended
            - conversation_analysed
        active:
          type: boolean
          description: Flag to enable or disable the webhook.
          example: false
          default: true

    # Campaign APIs Schemas
    CreateCampaignRequest:
      required:
      - agentId
      - file
      - sipPhoneNumber
      type: object
      properties:
        campaignName:
          type: string
        sipPhoneNumber:
          type: string
          description: Phone number of the caller in E.164 format. Must be purchased
            from SigmaMind or SIP trunking with SigmaMind
          example: "+14155552671"
        agentId:
          type: string
          description: Unique id of Agent that will respond to all outbound calls
            in this campaign
          example: D5D0p7TUs66TTAEAx
        file:
          type: string
          format: binary
        isScheduled:
          type: boolean
          description: If campaign is scheduled for launch at given time
          example: true
        scheduledDate:
          type: string
          description: scheduled date is required if scheduled
          format: date-time
        scheduledTime:
          type: string
          description: Scheduled time is required if scheduled
          format: time
          example: 12:00:00
        scheduledTimezone:
          type: string
          description: Scheduled timezone is required if scheduled
          format: timezone
          example: America/Los_Angeles
        concurrentCalls:
          type: integer
          description: Number of outbound calls in progress at a time in a campaign
          format: int32
          example: 5
        variables:
          type: object
          description: Dynamic variables required in Selected Agent
          example:
            customer_name: Michael
    CampaignResponse:
      type: object
      properties:
        campaignId:
          type: string
          description: A unique identifier assigned to the campaign.
          example: camp-XiQEBcj9cc5TFRB4
        campaignName:
          type: string
          description: The name given to the campaign for reference or display purposes.
          example: My Campaign
        campaignStatus:
          type: string
          description: Indicates the current status of the campaign.
          example: live
          enum:
          - "live, scheduled, paused, completed"
        scheduledDate:
          type: string
          description: The scheduled date and time when the campaign is set to launch
          format: date-time
        concurrentCalls:
          type: integer
          description: Specifies the maximum number of outbound calls allowed to be
            active simultaneously within the campaign.
          format: int32
          example: 5
        agent:
          $ref: '#/components/schemas/AgentResponse'
        phoneNumber:
          $ref: '#/components/schemas/PhoneNumberResponse'
        errors:
          type: array
          items:
            type: string
        scheduled:
          type: boolean
    UpdateCampaignRequest:
      type: object
      properties:
        campaignName:
          type: string
        sipPhoneNumber:
          type: string
        agentId:
          type: string
        isScheduled:
          type: boolean
        scheduledDate:
          type: string
        scheduledTime:
          type: string
        scheduledTimezone:
          type: string
        concurrentCalls:
          type: integer
          format: int64
        variables:
          type: object
    PaginatedResponseCampaignResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CampaignResponse'
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalCounts:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean

    # Webhooks APIs Schemas
    CreateWebhookRequest:
      required:
      - agentId
      - events
      - name
      - secret
      - url
      type: object
      properties:
        name:
          type: string
          description: A unique identifier for the webhook.
          example: wh_BUbkx3PsbzQm5V10
        agentId:
          type: string
          description: Unique identifier of the agent to which the webhook is associated.
          example: D5D0p7TUs66TTAEAx
        url:
          pattern: https?://.+
          type: string
          description: The HTTPS endpoint to which the webhook payload will be sent.
            Must be a valid HTTPS URL.
          example: https://example.com/webhook
        secret:
          type: string
          description: Secret key used to authenticate webhook payloads. This key
            should be securely stored and verified on the receiving server.
          example: key_S7ULC2lBwbg.85ez_yKnXTG6I5OgDHwTBNMSOD2ZyyUFUuDgweVXcXE
        events:
          uniqueItems: true
          type: array
          description: List of events that will trigger the webhook. Each event name
            corresponds to a specific type of activity in the system.
          items:
            type: string
            description: List of events that will trigger the webhook. Each event
              name corresponds to a specific type of activity in the system.
            enum:
            - conversation_started
            - conversation_ended
            - conversation_analysed
    WebhookResponse:
      type: object
      properties:
        workspaceId:
          type: string
          description: A unique identifier of the workspace.
          example: org_BUbkx3PsbzQm5V10
        webhookId:
          type: string
          description: A unique identifier for the webhook.
          example: wh_BUbkx3PsbzQm5V10
        name:
          type: string
          description: The display name of the webhook for easy identification.
          example: My Webhook
        agentId:
          type: string
          description: The unique identifier of the agent to which the webhook is
            assigned.
          example: D5D0p7TUs66TTAEAx
        active:
          type: boolean
          description: Indicates whether the webhook is currently active and able
            to receive events.
          example: true
        events:
          type: array
          description: Specifies the list of events that trigger the webhook.
          items:
            type: string
            description: Specifies the list of events that trigger the webhook.
            enum:
            - "conversation_started, conversation_ended, conversation_analysed"
          enum:
          - "conversation_started, conversation_ended, conversation_analysed"
        url:
          type: string
    PaginatedResponseWebhookResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/WebhookResponse'
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalCounts:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean

    # API Keys APIs Schemas
    CreateApiKeyRequest:
      required:
      - name
      type: object
      properties:
        tenantOrgId:
          type: integer
          format: int64
        name:
          maxLength: 100
          minLength: 0
          type: string
          description: "A descriptive name for the API key (max length: 100)."
          example: Default
        description:
          maxLength: 500
          minLength: 0
          type: string
          description: "An optional description for the API key (max length: 500)."
          example: Default API Key to access APIs
    ApiKeyResponse:
      type: object
      properties:
        id:
          type: integer
          description: The unique identifier of the API key.
          format: int64
        keyId:
          type: string
          description: A system-generated key identifier.
          example: gsU1oqy8hZM
        name:
          type: string
          description: The name assigned to the API key.
          example: Default
        description:
          type: string
          description: The description of the API key.
          example: Default API Key to access APIs
        status:
          type: string
          description: The current status of the API key.
          example: active
          enum:
          - Active
          - Revoked
          - Expired
        expiresAt:
          type: string
          description: The expiration date and time of the API key.
          format: date-time
          example: 2021-04-20T10:00:00Z
        createdAt:
          type: string
          description: The date and time when the API key was created.
          format: date-time
          example: 2021-04-20T10:00:00Z
        secretKey:
          type: string
          description: The secret key value used to authenticate API requests.
          example: key_S7ULC2lBwbg.85ez_yKnXTG6I5OgDHwTBNMSOD2ZyyUFUuDgweVXcXE
    PaginatedResponseApiKeyResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ApiKeyResponse'
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalCounts:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean

    # Other Schemas
    AgentResponse:
      type: object
      properties:
        name:
          type: string
          description: The display name of the assigned agent.
          example: New AI Agent
        agentId:
          type: string
          description: The unique identifier of the agent within the system.
          example: D5D0p7TUs66TTAEAx
        status:
          type: string
          description: The current operational status of the agent.
          example: live
          enum:
          - "live, testing, disabled"
      description: Assigned agent for current campaign
      example:
        name: Demo Agent
        agentId: mJzLaPEo425lieb9
        status: Testing
    JsonNode:
      type: object
      description: "A set of dynamic key-value pairs required by the selected Agent.\
        \ These variables allow personalization of the call, such as passing the customer’\
        s name or other contextual details."
      example:
        customer_name: Michael

    # Error Schema
    Error:
      type: object
      properties:
        timestamp:
          type: string
          description: Error timestamp in ISO format
          format: date-time
        status:
          type: integer
          description: HTTP status code
          example: 400
        error:
          type: string
          description: Error type or HTTP status message
          example: Bad Request
        message:
          type: string
          description: Detailed error message
          example: Email is required
        path:
          type: string
          description: Request path where error occurred
          example: /v1/users
        validationErrors:
          type: object
          description: Field validation errors (if any)
          example: |-
            {
              "email": "Email is required",
              "name": "Name is too short"
            }
      description: Standard error response
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      description: API Key is required in header. You can find it in the settings
      name: X-API-Key
      in: header
