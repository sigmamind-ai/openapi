          minLength: 0
          pattern: "^[a-z]+(_[a-z]+)*$"
          type: string
          description: Human-readable label for this integration
          example: my_shopify_store
        description:
          maxLength: 512
          minLength: 0
          type: string
          description: Optional description of what this integration is used for
          example: Handles order lookups for the support agent
    UpdateIntegrationRequest:
      type: object
      properties:
        name:
          maxLength: 128
          minLength: 0
          pattern: "^[a-z]+(_[a-z]+)*$"
          type: string
          description: Human-readable label for this integration
          example: my_shopify_store
        description:
          maxLength: 512
          minLength: 0
          type: string
          description: Optional description of what this integration is used for
          example: Handles order lookups and refunds for the support agent
    IntegrationResponse:
      type: object
      properties:
        integrationId:
          type: string
          description: Unique identifier for the integration
          example: intg-AuUKK371Spr5
        name:
          type: string
