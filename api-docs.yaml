          type: boolean
          description: Indicates whether post-conversation analysis should be performed
            to extract insights after the conversation ends.
          example: true
          default: false
        postConversationInsightsLlmModel:
          type: string
          description: The language model that powers the AI's post-conversation analysis.
          example: gpt-4o-mini
          default: gpt-4o-mini
        webhooks:
          type: array
          items:
            $ref: '#/components/schemas/WebhookResponse'
        postConversationInsights:
          type: array
          items:
            $ref: '#/components/schemas/PostConversationInsightsRequest'
    UpdateAgentRequest:
      type: object
      properties:
        agentName:
          type: string
          description: The name of the agent.
          example: Auralis
        instructions:
          type: string
          description: "Instructional prompt provided to the agent to guide its behavior,\
            \ tone, and task execution."
          example: You are a helpful customer support assistant. Answer concisely
            and professionally.
        welcomeMessageType:
          type: string
          description: Specifies whether the welcome message is a predefined static
            message or dynamically generated from a prompt.
          example: static
          default: static
          enum:
          - static
          - prompt
        welcomeMessage:
          type: string
          description: "The content of the welcome message. If 'welcomeMessageType'\
            \ is 'static', this contains the exact message shown to the user. If it\
            \ is 'prompt', this contains the prompt used to generate the welcome message\
            \ dynamically."
          example: Welcome to our service! How can I assist you today?
        agentSettings:
          $ref: '#/components/schemas/UpdateAgentSettingsRequest'
    UpdateAgentSettingsRequest:
      type: object
      properties:
        language:
          type: string
          description: The language your customers will primarily speak during calls.
          example: en_US
          default: en_US
          enum:
          - multi_nova3
          - multi_nova2
          - en
          - en_US
          - en_AU
          - en_GB
          - en_NZ
          - en_IN
          - hi
          - de
          - de_CH
          - nl
          - sv
          - sv_SE
          - da
          - da_DK
          - es
          - es_419
          - fr
          - fr_CA
          - pt
          - pt_BR
          - pt_PT
          - it
          - tr
          - no
          - id
          - bg
          - ca
          - zh
          - zh_CN
          - zh_Hans
          - zh_TW
          - zh_Hant
          - zh_HK
          - cs
          - et
          - fi
          - nl_BE
          - el
          - hu
          - ja
          - ko
          - ko_KR
          - lv
          - lt
          - ms
          - pl
          - ro
          - ru
          - sk
          - th
          - th_TH
          - uk
          - vi
        aiStartsConversation:
          type: boolean
          description: "If true the AI agent will initiate the conversation immediately\
            \ when the call connects. If false the call will connect silently, waiting\
            \ for the customer to speak first before the AI responds"
          example: true
          default: true
        backgroundSound:
          type: string
          description: Add ambient background audio during the call.
          example: keyboard_typing
          default: none
          enum:
          - keyboard_typing
          - office_ambience
          - none
        interruptionSensitivity:
          maximum: 1.0
          exclusiveMaximum: false
          minimum: 0.01
          exclusiveMinimum: false
          type: number
          description: "Controls how sensitive the speech output is to user interruptions.\
            \ Lower values make the agent less likely to stop speaking when interrupted,\
            \ while higher values make it more responsive to interruptions."
          format: double
          example: 0.05
          default: 0.05
        globalPrompt:
          type: string
          description: "A global system prompt that is applied to every conversation\
            \ to define the agent’s overall behavior, tone, and constraints."
          example: You are a professional virtual assistant. Always respond politely
            and keep answers concise.
        endCallOnSilenceDuration:
          maximum: 30
          minimum: 1
          type: number
          description: Specifies the duration of continuous silence (in minutes) after
            which the call will be automatically ended.
          format: float
          example: 30
          default: 5
        maxCallDuration:
          maximum: 120
          minimum: 1
          type: integer
          description: Maximum call duration in minutes before the call is automatically
            terminated.
          format: int32
          example: 40
          default: 60
        llmModel:
          type: string
          description: The language model that powers the AI's responses.
          example: gpt-4o-mini
          default: gpt-4o-mini
        voiceId:
          type: string
          description: This is the AI's speaking voice id.
          example: elevenlabs_SGbOfpm28edC83pZ9iGb
          default: elevenlabs_EXAVITQu4vr4xnSDxMaL
        voiceModelId:
          type: string
          description: This is the AI's text to speech engine version.
          example: eleven_turbo_v2_5
          default: eleven_turbo_v2_5
        enablePostConversationInsights:
          type: boolean
          description: Indicates whether post-conversation analysis should be performed
            to extract insights after the conversation ends.
          example: true
          default: false
        postConversationInsightsLlmModel:
          type: string
          description: The language model that powers the AI's post-conversation analysis.
          example: gpt-4o-mini
          default: gpt-4o-mini
        webhooks:
          type: array
          items:
            $ref: '#/components/schemas/WebhookConfigUpdateRequest'
        postConversationInsights:
          type: array
          items:
            $ref: '#/components/schemas/PostConversationInsightsRequest'
    WebhookConfigUpdateRequest:
      required:
      - name
      - url
      type: object
      properties:
        webhookId:
          type: string
          description: A unique identifier for the webhook.
          example: wh_BUbkx3PsbzQm5V10
        name:
          type: string
          description: The display name of the webhook for easy identification.
          example: My Webhook
        url:
          pattern: https?://.+
          type: string
          description: The HTTPS endpoint to which the webhook payload will be sent.
            Must be a valid HTTPS URL.
          example: https://example.com/webhook
        events:
          uniqueItems: true
          type: array
          description: List of events that will trigger the webhook. Each event name
            corresponds to a specific type of activity in the system.
          items:
            type: string
            description: List of events that will trigger the webhook. Each event
              name corresponds to a specific type of activity in the system.
            enum:
            - conversation_started
            - conversation_ended
            - conversation_analysed
        active:
          type: boolean
          description: Flag to enable or disable the webhook.
          example: false
          default: true

    # Campaign APIs Schemas
    CreateCampaignRequest:
      required:
      - agentId
      - campaignName
      - file
      - sipPhoneNumber
      type: object
      properties:
        campaignName:
          maxLength: 128
          minLength: 1
          type: string
          description: Name of the campaign.
          example: Q4 Outreach Campaign
        sipPhoneNumber:
          pattern: "^\\+[1-9][0-9]{6,14}$"
          type: string
          description: Phone number of the caller in E.164 format. Must be purchased
            from SigmaMind or configured via SIP trunking.
          example: +14155552671
        agentId:
          maxLength: 64
          minLength: 1
          type: string
          description: Unique identifier of the Agent that will handle all outbound
            calls in this campaign.
          example: D5D0p7TUs66TTAEAx
        file:
          type: string
          format: binary
        isScheduled:
          type: boolean
          description: Whether the campaign is scheduled for a future launch time.
          example: true
        scheduledDate:
          type: string
          description: Scheduled launch date. Required when isScheduled is true.
          format: date
          example: 2025-09-25
        scheduledTime:
          type: string
          description: Scheduled launch time. Required when isScheduled is true.
          format: time
          example: 12:00:00
        scheduledTimezone:
          type: string
          description: Timezone for the scheduled launch. Required when isScheduled
            is true.
          example: America/Los_Angeles
        concurrentCalls:
          type: integer
          description: Maximum number of concurrent outbound calls allowed at any
            time during the campaign.
          format: int32
          example: 5
        variables:
          type: object
          description: Dynamic variables required by the selected Agent.
          example:
            customer_name: Michael
    CampaignResponse:
      type: object
      properties:
        campaignId:
          type: string
          description: A unique identifier assigned to the campaign.
          example: camp-XiQEBcj9cc5TFRB4
        campaignName:
          type: string
          description: The name given to the campaign for reference or display purposes.
          example: My Campaign
        campaignStatus:
          type: string
          description: Indicates the current status of the campaign.
          example: live
          enum:
          - live
          - scheduled
          - paused
          - completed
        scheduledDate:
          type: string
          description: The scheduled date and time when the campaign is set to launch
          format: date-time
        concurrentCalls:
          type: integer
          description: Specifies the maximum number of outbound calls allowed to be
            active simultaneously within the campaign.
          format: int32
          example: 5
        agent:
          $ref: '#/components/schemas/AgentResponse'
        phoneNumber:
          $ref: '#/components/schemas/PhoneNumberResponse'
        errors:
          type: array
          items:
            type: string
        scheduled:
          type: boolean
    UpdateCampaignRequest:
      type: object
      properties:
        campaignName:
          type: string
        sipPhoneNumber:
          type: string
        agentId:
          type: string
        isScheduled:
          type: boolean
        scheduledDate:
          type: string
        scheduledTime:
          type: string
        scheduledTimezone:
          type: string
        concurrentCalls:
          type: integer
          format: int64
        variables:
          type: object
    PaginatedResponseCampaignResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CampaignResponse'
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalCounts:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean

    # Integrations APIs Schemas
    CreateIntegrationRequest:
      required:
      - name
      type: object
      properties:
        name:
