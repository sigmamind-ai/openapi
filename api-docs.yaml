        totalPages:
          type: integer
          format: int32
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean

    # Batch Run APIs Schemas
    BatchRunRequest:
      required:
      - agentId
      - testCases
      type: object
      properties:
        agentId:
          type: string
          description: The unique identifier of the Agent that will respond across
            all test cases in the batch simulation.
          example: D5D0p7TUs66TTAEAx
        testCases:
          type: array
          description: A list of test case IDs to be executed together in a single
            batch run. Each test case will be simulated independently against the
            specified Agent.
          example:
          - tc_xeeXG5hX9dl0VFNt
          - tc_aQqGZoMIPbU5MXHV
          items:
            type: string
            description: A list of test case IDs to be executed together in a single
              batch run. Each test case will be simulated independently against the
              specified Agent.
            example: "[\"tc_xeeXG5hX9dl0VFNt\",\"tc_aQqGZoMIPbU5MXHV\"]"
    CreateBatchRunResponse:
      type: object
      properties:
        batchId:
          type: string
          description: The unique identifier of the newly created batch run.
          example: batch_s0OJu2JWR8R45Fai
        workspaceId:
          type: string
          description: The unique identifier of the workspace under which the batch
            run was created.
          example: org_V6eZ2zg8ziDx5pft
        agent:
          $ref: '#/components/schemas/AgentResponse'
        createdDate:
          type: string
          description: The UTC timestamp indicating when the batch run was created.
          format: date-time
          example: 2026-03-26T10:52:45.565905Z
    BatchResponse:
      type: object
      properties:
        batchId:
          type: string
          description: The unique identifier of the batch run.
          example: batch_s0OJu2JWR8R45Fai
        workspaceId:
          type: string
          description: The unique identifier of the workspace under which the batch
            run was created.
          example: org_V6eZ2zg8ziDx5pft
        agent:
          $ref: '#/components/schemas/AgentResponse'
        createdDate:
          type: string
          description: The UTC timestamp indicating when the batch run was created.
          format: date-time
          example: 2026-03-26T10:52:45.565905Z
        testCases:
          type: array
          description: "The list of test cases included in this batch run, along with\
            \ their individual simulation results."
          items:
            $ref: '#/components/schemas/TestCaseResponse'
        successfulAttempts:
          type: integer
          description: The total number of simulation attempts across all test cases
            in this batch run that were evaluated as successful.
          format: int64
          example: 4
        failedAttempts:
          type: integer
          description: The total number of simulation attempts across all test cases
            in this batch run that were evaluated as failed.
          format: int64
          example: 1
        totalAttempts:
          type: integer
          description: The total number of simulation attempts executed across all
            test cases in this batch run.
          format: int64
          example: 5
    PaginatedResponseBatchResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BatchResponse'
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalCounts:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean

    # Test Run APIs Schemas
    TestCaseRunResponse:
      type: object
      properties:
        batchId:
          type: string
          description: The unique identifier of the batch run this simulation attempt
            belongs to.
          example: batch_s0OJu2JWR8R45Fai
        workspaceId:
          type: string
          description: The unique identifier of the workspace under which this simulation
            attempt was created.
          example: org_V6eZ2zg8ziDx5pft
        agent:
          $ref: '#/components/schemas/AgentResponse'
        testCase:
          $ref: '#/components/schemas/TestCaseResponse'
        jobId:
          type: string
          description: The unique identifier of this individual simulation attempt
            within the batch run.
          example: job_ksUu5yRHGTLLrLeM
        chatId:
          type: string
          description: The unique identifier of the chat session generated during
            this simulation run.
          example: chat-IpELinkFvINQ1212
        createdDate:
          type: string
          description: The UTC timestamp indicating when this simulation run was initiated.
          format: date-time
          example: 2026-03-26T10:52:45.565905Z
        completedDate:
          type: string
          description: The UTC timestamp indicating when this simulation run was completed.
          format: date-time
          example: 2026-03-26T10:54:45.565905Z
        isSuccesful:
          type: boolean
          description: Indicates whether the Agent met the success criteria during
            this simulation run.
          example: true
        remarks:
          type: string
          description: "A plain-language explanation of why the simulation run was\
            \ evaluated as successful or failed, based on the success criteria."
          example: The Agent successfully maintained focus on the primary task of
            addressing the customer's order enquiry.
        conversation:
          type: array
          description: The full transcript of the conversation between the simulated
            user and the Agent during this simulation run.
          items:
            $ref: '#/components/schemas/ConversationResponse'
    ConversationResponse:
      type: object
      properties:
        role:
          type: string
          description: The role of the participant who sent this message in the simulation.
            Indicates whether the message was generated by the simulated user or the
            Agent.
          example: user
        content:
          type: string
          description: The message content produced by the participant for this turn
            in the conversation.
          example: I want to cancel my subscription immediately.
      description: The full transcript of the conversation between the simulated user
        and the Agent during this simulation run.
    PaginatedResponseTestCaseRunResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TestCaseRunResponse'
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalCounts:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean
    
    # Other Schemas
    AgentResponse:
      type: object
      properties:
        name:
          type: string
          description: The display name of the assigned agent.
          example: New AI Agent
        agentId:
          type: string
          description: The unique identifier of the agent within the system.
          example: D5D0p7TUs66TTAEAx
        status:
          type: string
          description: The current operational status of the agent.
          example: Live
          enum:
          - "Live, Testing, Disabled"
      description: Assigned agent for handling conversations
      example:
        name: Demo Agent
        agentId: D5D0p7TUs66TTAEAx
        status: Testing
    JsonNode:
      type: object
      description: "A set of dynamic key-value pairs required by the selected Agent.\
        \ These variables allow personalization of the call, such as passing the customer’\
        s name or other contextual details."
      example:
        customer_name: Michael

    # Error Schema
    Error:
      type: object
      properties:
        timestamp:
          type: string
          description: Error timestamp in ISO format
          format: date-time
        status:
          type: integer
          description: HTTP status code
          example: 400
        error:
          type: string
          description: Error type or HTTP status message
          example: Bad Request
        message:
          type: string
          description: Detailed error message
          example: Email is required
        path:
          type: string
          description: Request path where error occurred
          example: /v1/users
        validationErrors:
          type: object
          description: Field validation errors (if any)
          example: |-
            {
              "email": "Email is required",
              "name": "Name is too short"
            }
      description: Standard error response
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      description: API Key is required in header. You can find it in the settings
      name: X-API-Key
      in: header
