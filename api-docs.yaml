    # Campaign APIs Schemas
    CreateCampaignRequest:
      required:
      - agentId
      - campaignName
      - file
      - sipPhoneNumber
      type: object
      properties:
        campaignName:
          maxLength: 128
          minLength: 1
          type: string
          description: Name of the campaign.
          example: Q4 Outreach Campaign
        sipPhoneNumber:
          pattern: "^\\+[1-9][0-9]{6,14}$"
          type: string
          description: Phone number of the caller in E.164 format. Must be purchased
            from SigmaMind or configured via SIP trunking.
          example: +14155552671
        agentId:
          maxLength: 64
          minLength: 1
          type: string
          description: Unique identifier of the Agent that will handle all outbound
            calls in this campaign.
          example: D5D0p7TUs66TTAEAx
        file:
          type: string
          format: binary
        isScheduled:
          type: boolean
          description: Whether the campaign is scheduled for a future launch time.
          example: true
        scheduledDate:
          type: string
          description: Scheduled launch date. Required when isScheduled is true.
          format: date
          example: 2025-09-25
        scheduledTime:
          type: string
          description: Scheduled launch time. Required when isScheduled is true.
          format: time
          example: 12:00:00
        scheduledTimezone:
          type: string
          description: Timezone for the scheduled launch. Required when isScheduled
            is true.
          example: America/Los_Angeles
        concurrentCalls:
          type: integer
          description: Maximum number of concurrent outbound calls allowed at any
            time during the campaign.
          format: int32
          example: 5
        variables:
          type: object
          description: Dynamic variables required by the selected Agent.
          example:
            customer_name: Michael
    CampaignResponse:
      type: object
      properties:
        campaignId:
          type: string
          description: A unique identifier assigned to the campaign.
          example: camp-XiQEBcj9cc5TFRB4
        campaignName:
          type: string
          description: The name given to the campaign for reference or display purposes.
          example: My Campaign
        campaignStatus:
          type: string
          description: Indicates the current status of the campaign.
          example: live
          enum:
          - "live, scheduled, paused, completed"
        scheduledDate:
          type: string
          description: The scheduled date and time when the campaign is set to launch
          format: date-time
        concurrentCalls:
          type: integer
          description: Specifies the maximum number of outbound calls allowed to be
            active simultaneously within the campaign.
          format: int32
          example: 5
        agent:
          $ref: '#/components/schemas/AgentResponse'
        phoneNumber:
          $ref: '#/components/schemas/PhoneNumberResponse'
        errors:
          type: array
          items:
            type: string
        scheduled:
          type: boolean
    UpdateCampaignRequest:
      type: object
      properties:
        campaignName:
          type: string
        sipPhoneNumber:
          type: string
        agentId:
          type: string
        isScheduled:
          type: boolean
        scheduledDate:
          type: string
        scheduledTime:
          type: string
        scheduledTimezone:
          type: string
        concurrentCalls:
          type: integer
          format: int64
        variables:
          type: object
    PaginatedResponseCampaignResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CampaignResponse'
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalCounts:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean

    # Webhooks APIs Schemas
    CreateWebhookRequest:
      required:
      - agentId
      - events
      - name
      - url
      type: object
      properties:
        name:
          maxLength: 128
          minLength: 1
          type: string
          description: A unique identifier for the webhook.
          example: wh_BUbkx3PsbzQm5V10
        agentId:
          maxLength: 64
          minLength: 1
          type: string
          description: Unique identifier of the agent to which the webhook is associated.
          example: D5D0p7TUs66TTAEAx
        url:
          pattern: https?://.+
          type: string
          description: The HTTPS endpoint to which the webhook payload will be sent.
            Must be a valid HTTPS URL.
          example: https://example.com/webhook
        events:
          uniqueItems: true
          type: array
          description: List of events that will trigger the webhook. Each event name
            corresponds to a specific type of activity in the system.
          example:
          - conversation_started
          - conversation_ended
          items:
            type: string
            description: List of events that will trigger the webhook. Each event
              name corresponds to a specific type of activity in the system.
            example: "[\"conversation_started\",\"conversation_ended\"]"
            enum:
            - conversation_started
            - conversation_ended
            - conversation_analysed
    WebhookResponse:
      type: object
      properties:
        workspaceId:
          type: string
          description: A unique identifier of the workspace.
          example: org_BUbkx3PsbzQm5V10
        webhookId:
          type: string
          description: A unique identifier for the webhook.
          example: wh_BUbkx3PsbzQm5V10
        name:
          type: string
          description: The display name of the webhook for easy identification.
          example: My Webhook
        agentId:
          type: string
          description: The unique identifier of the agent to which the webhook is
            assigned.
          example: D5D0p7TUs66TTAEAx
        active:
          type: boolean
          description: Indicates whether the webhook is currently active and able
            to receive events.
          example: true
        secret:
          type: string
          description: Secret key used to authenticate webhook payloads. This key
            should be securely stored and verified on the receiving server.
          example: mK9vXq2pL8nR5tY1wA3sD6fH0jC4bE7u
        events:
          type: array
          description: Specifies the list of events that trigger the webhook.
          items:
            type: string
            description: Specifies the list of events that trigger the webhook.
            enum:
            - "conversation_started, conversation_ended, conversation_analysed"
          enum:
          - "conversation_started, conversation_ended, conversation_analysed"
        url:
          type: string
          description: The HTTPS endpoint to which the webhook payload will be sent.
          example: https://example.com/webhook
    PaginatedResponseWebhookResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/WebhookResponse'
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalCounts:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean

