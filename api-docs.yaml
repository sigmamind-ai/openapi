    # Chat APIs Schemas
    CreateChatRequest:
      required:
      - agentId
      - input
      type: object
      properties:
        agentId:
          type: string
          description: The unique identifier of the Agent assigned to handle the chat
            completion.
          example: D5D0p7TUs66TTAEAx
        input:
          type: string
          description: Input message of the customer or history of the conversation
          example: Where is my order?
        dynamicVariables:
          type: object
          description: "A set of dynamic key-value pairs required by the selected\
            \ Agent. These variables allow personalization of the call, such as passing\
            \ the customer’s name or other contextual details."
          example:
            customer_name: Michael
        previousChatId:
          type: string
          description: Unique ID of the chat that will be used as context for the
            new chat.
          example: chat-D5D0p7TUs66TTAEAx
    CreateChatCompletionRequest:
      required:
      - chatId
      - input
      type: object
      properties:
        chatId:
          type: string
          description: The unique identifier of chat completion in specific agent.
          example: chat-nZ9hHYAANJbhLwZv
        input:
          type: string
          description: Input message of the customer
          example: Where is my order?
    UpdateChatRequest:
      type: object
      properties:
        agentId:
          type: string
          description: The unique identifier of the Agent assigned to handle the chat
            completion.
          example: D5D0p7TUs66TTAEAx
        dynamicVariables:
          type: object
          description: "A set of dynamic key-value pairs required by the selected\
            \ Agent. These variables allow personalization of the call, such as passing\
            \ the customer’s name or other contextual details."
          example:
            customer_name: Michael
    ChatCompletionResponse:
      type: object
      properties:
        chatId:
          type: string
          description: Unique identity for a chat
          example: chat-d17T6uReChpyfFeP
        createdAt:
          type: string
          description: The timestamp when the call record was created.
          format: date-time
          example: 2021-04-20T10:00:00Z
        status:
          type: string
          description: Status of the chat
          example: ended
          enum:
          - "in-progress, ended, error"
        response:
          type: array
          description: Agent response of the last user message
          example:
          - id: chat-item-G9YdhDqua0EngI1G
            role: assistant
            type: message
            content:
            - "Hello! My name is Grace, and I'm calling on behalf of SigmaMind AI.\
              \ Am I speaking with Michael?"
          items:
            $ref: '#/components/schemas/ChatMessage'
        agent:
          $ref: '#/components/schemas/AgentResponse'
    ChatMessage:
      type: object
      properties:
        id:
          type: string
          description: Unique identity for a chat message
          example: item-d17T6uReChpyfFeP
        role:
          type: string
          description: Role of the chat message
          example: user
          enum:
          - "user, assistant"
        type:
          type: string
          description: Type of the chat message
          example: message
          enum:
          - message
        content:
          type: array
          description: Chat message content
          example: "Hello! My name is Grace, and I'm calling on behalf of SigmaMind\
            \ AI. Am I speaking with Michael?"
          items:
            type: string
            description: Chat message content
            example: "Hello! My name is Grace, and I'm calling on behalf of SigmaMind\
              \ AI. Am I speaking with Michael?"
      description: Agent response of the last user message
      example:
      - id: chat-item-G9YdhDqua0EngI1G
        role: assistant
        type: message
        content:
        - "Hello! My name is Grace, and I'm calling on behalf of SigmaMind AI. Am\
          \ I speaking with Michael?"
    ChatResponse:
      type: object
      properties:
        chatId:
          type: string
          description: Unique identity for a chat
          example: chat-d17T6uReChpyfFeP
        agent:
          $ref: '#/components/schemas/AgentResponse'
        createdAt:
          type: string
          description: The timestamp when the call record was created.
          format: date-time
          example: 2021-04-20T10:00:00Z
        status:
          type: string
          description: Status of chat
          example: ended
        transcript:
          type: string
          description: transcript of the conversation in chat
        response:
          type: array
          description: Agent response of the last user message
          example:
          - id: chat-item-G9YdhDqua0EngI1G
            role: assistant
            type: message
            content:
            - "Hello! My name is Grace, and I'm calling on behalf of SigmaMind AI.\
              \ Am I speaking with Michael?"
          items:
            $ref: '#/components/schemas/ChatMessage'
        messages:
          type: array
          description: Agent response of the last user message
          example:
          - id: chat-item-G9YdhDqua0EngI1G
            role: assistant
            type: message
            content:
            - "Hello! My name is Grace, and I'm calling on behalf of SigmaMind AI.\
              \ Am I speaking with Michael?"
          items:
            $ref: '#/components/schemas/ChatMessage'
        dynamicVariables:
          $ref: '#/components/schemas/JsonNode'
    PaginatedResponseChatResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ChatResponse'
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalCounts:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean

    # Phone Number APIs Schemas
    CreatePhoneNumberRequest_Telephony:
      type: object
      properties:
        friendlyName:
          type: string
          description: A user-friendly label for the phone number.
          example: My Phone Number
        countryCode:
          type: string
          description: "The ISO country code (e.g., 'US', 'IN') indicating the country\
            \ from which the number should be purchased. Required if phoneNumber is\
            \ not provided."
          example: US
        areaCode:
          type: integer
          description: The area/region code within the specified country from which
            the number should be purchased.
          format: int32
          example: 415
        phoneNumber:
          type: string
          description: "The phone number to purchase, in E.164 format (e.g., `+14155552671`).\
            \ If provided, this exact number will be purchased if available with the\
            \ provider. If omitted, a number is automatically selected based on `countryCode`\
            \ (and `areaCode`, if specified)."
          example: "+14155552671"
        inboundAgentId:
          type: string
          description: The inbound AI agent ID to be associated with this phone number.
          example: awTw7UKhOsLGiDbt
        outboundAgentId:
          type: string
          description: The outbound AI agent ID to be associated with this phone number.
          example: awTw7UKhOsLGiDbt
        outboundPhoneNumber:
          type: string
          description: "The outbound phone number, in E.164 format, used for test\
            \ calls."
          example: "+14155552671"
    ImportPhoneNumberRequest_Byo:
      required:
      - phoneNumber
      - terminationSipURI
      - trunkPassword
      - trunkUsername
      type: object
      properties:
        friendlyName:
          type: string
          description: A user-friendly label for the phone number.
          example: My Phone Number
        phoneNumber:
          type: string
          description: The phone number in +E.164 format. Required when bringing your
            own number.
          example: "+14155552671"
        inboundAgentId:
          type: string
          description: The inbound AI agent ID to be associated with this phone number.
          example: awTw7UKhOsLGiDbt
        outboundAgentId:
          type: string
          description: The outbound AI agent ID to be associated with this phone number.
          example: awTw7UKhOsLGiDbt
        trunkUsername:
          type: string
          description: The trunk username used for outbound calls. Must be set up
            in your provider account.
          example: username
        trunkPassword:
          type: string
          description: The trunk password is used for outbound calls. Must be set
            up in your provider account.
          example: password
        terminationSipURI:
          type: string
          description: "The SIP URI for terminating calls, provided by the telecom\
            \ provider."
          example: sip.telnyx.com
        outboundPhoneNumber:
          type: string
          description: "The outbound phone number, in E.164 format, used for test\
            \ calls."
          example: "+14155552671"
    PhoneNumberResponse:
      type: object
      properties:
        sipPhoneNumber:
          type: string
          description: The caller’s phone number in E.164 format. This number must
            be obtained from SigmaMind or configured using SIP trunking with SigmaMind.
          example: "+14155552671"
        provider:
          type: string
          description: The service provider associated with the phone number.
          example: twilio
          enum:
          - "twilio, telnyx, byo"
        inboundAgentId:
          type: string
          description: Default agent ID assigned to handle inbound calls for this
            phone number.
          example: D5D0p7TUs66TTAEAx
        outboundAgentId:
          type: string
          description: Default agent ID assigned to handle outbound calls for this
            phone number.
          example: D5D0p7TUs66TTAEAx
        outboundPhoneNumber:
          type: string
          description: "The default outbound phone number of the callee, represented\
            \ in E.164 format"
          example: "+14155552671"
        active:
          type: boolean
          description: Indicates whether the phone number is currently active and
            available for use.
          example: true
        terminationSipURI:
          type: string
          description: "The SIP URI of the phone number, provided by the service provider\
            \ for call termination."
          example: sip.telnyx.com
        friendlyName:
          type: string
          description: A user-friendly display name assigned to this phone number.
          example: Support Line - US
