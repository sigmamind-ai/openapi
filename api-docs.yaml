          type: boolean
        hasPrevious:
          type: boolean

    # Integration Auth APIs Schemas
    CreateIntegrationAuthRequest:
      required:
      - authType
      type: object
      properties:
        authType:
          type: string
          description: "The authentication strategy this credential set uses. Determines\
            \ which credential fields are required: API_KEY — provide the apiKey object\
            \ (key name, secret value, and position). BEARER_TOKEN — provide the token\
            \ field. BASIC_AUTH — provide username and password fields. NO_AUTH —\
            \ no credential fields required."
          example: API_KEY
          enum:
          - NO_AUTH
          - BASIC_AUTH
          - BEARER_TOKEN
          - API_KEY
        token:
          type: string
          description: "The bearer token or JWT access token value. Required when\
            \ authType is BEARER_TOKEN. Sent as 'Authorization: Bearer <token>' on\
            \ every outbound request."
          example: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
        username:
          maxLength: 256
          minLength: 0
          type: string
          description: The username for Basic authentication. Required when authType
            is BASIC_AUTH. Combined with password and Base64-encoded into the Authorization
            header.
          example: api_user@example.com
        password:
          maxLength: 512
          minLength: 0
          type: string
          description: The password for Basic authentication. Required when authType
            is BASIC_AUTH. Combined with username and Base64-encoded into the Authorization
            header.
          example: s3cretP@ssword
        apiKey:
          $ref: '#/components/schemas/ApiKeyRequest'
        headers:
          type: array
          description: Optional list of static HTTP headers attached to every outbound
            request under this auth. Applied on top of any headers defined at the
            integration or tool level. Useful for fixed metadata headers required
            by the third-party API.
          example:
          - key: X-Request-Source
            value: sigmamind
          items:
            $ref: '#/components/schemas/HeaderEntry'
      description: Request body to register authentication credentials for a third-party
        integration. Only populate the fields relevant to the chosen authType — all
        other credential fields will be ignored.
    UpdateIntegrationAuthRequest:
      type: object
      properties:
        token:
          type: string
          description: Updated bearer token value. Only applicable when the auth record
            was created with authType BEARER_TOKEN. Replaces the previously stored
            token.
          example: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...updated
        username:
          maxLength: 256
          minLength: 0
          type: string
          description: Updated username for Basic authentication. Only applicable
            when the auth record was created with authType BASIC_AUTH.
          example: new_api_user@example.com
        password:
          maxLength: 512
          minLength: 0
          type: string
          description: Updated password for Basic authentication. Only applicable
            when the auth record was created with authType BASIC_AUTH.
          example: newS3cretP@ssword
        apiKey:
          $ref: '#/components/schemas/ApiKeyRequest'
        headers:
          type: array
          description: "Replaces the complete list of static headers for this auth\
            \ record. Pass a non-empty list to overwrite existing headers. Pass an\
            \ empty list [] to remove all headers. Omit this field entirely to leave\
            \ existing headers unchanged."
          items:
            $ref: '#/components/schemas/HeaderEntry'
      description: "Request body to partially update an existing auth credential record.\
        \ Only the fields provided will be updated — omitted fields remain unchanged.\
        \ Credential fields (token, username, password, apiKey) are patched within\
        \ the existing authType; the authType itself cannot be changed after creation."
    IntegrationAuthResponse:
      type: object
      properties:
        authId:
          type: string
          description: Unique identifier for the auth record
          example: auth-P3kNz7Yv1Qm9
        integrationId:
          type: string
          description: Unique identifier of the parent integration
          example: intg-AuUKK371Spr5
        authType:
          type: string
          description: Authentication strategy
          example: api_key
          enum:
          - NO_AUTH
          - BASIC_AUTH
          - BEARER_TOKEN
          - API_KEY
        headers:
          type: object
          description: Headers to be sent with the request
        createdAt:
          type: string
          description: Timestamp when the record was created
          format: date-time
        updatedAt:
          type: string
          description: Timestamp when the record was last updated
          format: date-time
    ApiKeyRequest:
      required:
      - key
      - position
      - value
      type: object
      properties:
        key:
          maxLength: 128
          minLength: 0
          type: string
          description: "The name of the header or query parameter that carries the\
            \ API key. Common values: 'X-Shopify-Access-Token' for Shopify, 'x-api-key'\
            \ for AWS Gateway, 'Authorization' when the key is sent as a bearer-style\
            \ header."
          example: X-Shopify-Access-Token
        value:
          type: string
          description: The secret API key value sent with every outbound request.
          example: shpat_abc123xyz456
        position:
          type: string
          description: "Where the API key is injected in the outbound request. 'header'\
            \ sends it as an HTTP header — the most common approach. 'query' appends\
            \ it as a URL query parameter, e.g. ?api_key=<value>. Default: header."
          example: header
          default: header
          enum:
          - header
          - query
      description: "Describes how an API key is attached to outbound requests. Provide\
        \ the header or query-param name, the secret value, and the injection position."
      example:
        key: X-API-KEY
        value: <secret>
        position: header
    HeaderEntry:
      required:
      - key
      - value
      type: object
      properties:
        key:
          maxLength: 256
          minLength: 0
          type: string
          description: The HTTP header name.
          example: Content-Type
        value:
          maxLength: 1024
          minLength: 0
          type: string
          description: The static value for this header.
          example: application/json
      description: A static HTTP header attached to every request made by this tool.
      example:
      - key: Content-Type
        value: application/json
    QueryParam:
      required:
      - key
      type: object
      properties:
        key:
          maxLength: 128
          minLength: 0
          type: string
          description: The query parameter name.
          example: status
        value:
          maxLength: 1024
          minLength: 0
          type: string
          description: "The query parameter value. Use a {{variable}} placeholder\
            \ so the AI agent can supply the value at runtime. Static values are also\
            \ accepted."
          example: "{{status}}"
      description: "A single query string parameter appended to the request URL. Path\
        \ variables are embedded directly in the endpoint URL using {{variable}} syntax\
        \ and do not need to be declared here."
      example:
      - key: status
        value: "{{status}}"
    PaginatedResponseIntegrationAuthResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/IntegrationAuthResponse'
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalCounts:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean

    # Integration Tools APIs Schemas
    CreateIntegrationToolRequest:
      required:
      - description
      - method
      - name
      - url
      type: object
      properties:
        name:
          maxLength: 128
          minLength: 0
          type: string
          description: "A unique, descriptive name for this tool within the integration.\
            \ The AI agent uses this name to identify and select the correct tool\
            \ when deciding which API to call. Use snake_case and make it action-oriented,\
            \ e.g. 'get_customer', 'create_order', 'cancel_subscription'."
          example: get_customer
        description:
          maxLength: 1024
          minLength: 0
          type: string
          description: A clear explanation of what this tool does and when the AI
            agent should call it. This description is used by the agent to decide
            whether to invoke this tool. Be specific about the action performed and
            any required inputs.
          example: "Fetches a Shopify customer record by customer ID. Call this tool\
            \ when you need to look up customer details such as name, email, or order\
            \ history."
        method:
          type: string
          description: The HTTP method for the underlying API call. GET — retrieve
            a resource without side effects. POST — create a new resource. PUT — fully
            replace an existing resource. PATCH — partially update an existing resource.
            DELETE — remove a resource.
          example: GET
          enum:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
        url:
          maxLength: 1024
          minLength: 0
          type: string
          description: "The full URL of the API endpoint this tool calls. Supports\
            \ {{variable}} placeholders for dynamic segments. Path variables must\
            \ also be declared in the params list with source PATH."
          example: "https://my-store.myshopify.com/admin/api/2024-01/customers/{{customerId}}.json"
        headers:
          type: array
          description: Static HTTP headers to include on every request made by this
            tool. These are merged with headers defined at the auth and integration
            level. Tool-level headers take precedence in case of conflicts.
          example:
          - key: Content-Type
            value: application/json
          items:
            $ref: '#/components/schemas/HeaderEntry'
        queryParams:
          type: array
          description: "Query string parameters appended to the URL on every request,\
            \ e.g. ?status=active&limit=10. Supports {{variable}} placeholders in\
            \ values so the AI agent can supply them at runtime. Path variables are\
            \ defined directly in the endpoint URL using {{variable}} syntax — they\
            \ do not need to be listed here."
          example:
          - key: status
            value: "{{status}}"
          items:
            $ref: '#/components/schemas/QueryParam'
        bodyParams:
          type: object
          description: "The request body payload as a JSON object. Supports {{variable}}\
            \ placeholders in values — the agent fills these at runtime. Only populated\
            \ for POST, PUT, and PATCH requests. Leave empty for GET and DELETE."
          example:
            first_name: "{{firstName}}"
            email: "{{email}}"
      description: "Request body to create a new API tool under an integration. A\
        \ tool represents a single callable API operation — for example 'Get Customer'\
        \ or 'Create Order' — that the AI agent can invoke at runtime using dynamic\
        \ {{variable}} placeholders."
    UpdateIntegrationToolRequest:
      type: object
      properties:
        name:
          maxLength: 128
          minLength: 0
          type: string
          description: Updated tool name. Should be snake_case and action-oriented.
            The AI agent uses this name to identify and select the correct tool.
          example: get_customer_with_orders
        description:
          maxLength: 1024
          minLength: 0
          type: string
          description: Updated description of what this tool does and when the agent
            should call it. Be specific — the agent relies on this to decide whether
            to invoke the tool.
          example: Fetches a Shopify customer including their recent orders. Use when
            full customer context including purchase history is needed.
        method:
          type: string
          description: Updated HTTP method for the underlying API call. GET — retrieve.
            POST — create. PUT — replace. PATCH — partial update. DELETE — remove.
          example: GET
          enum:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
        endpoint:
          maxLength: 1024
          minLength: 0
          type: string
          description: "Updated full URL of the API endpoint this tool calls. Supports\
            \ {{variable}} placeholders for dynamic segments. Updating this field\
            \ triggers automatic re-extraction of {{variable}} placeholders."
          example: "https://my-store.myshopify.com/admin/api/2024-01/customers/{{customerId}}/orders.json"
        headers:
          type: array
          description: "Replaces the complete list of static headers for this tool.\
            \ Pass a non-empty list to overwrite existing headers. Pass an empty list\
            \ [] to remove all headers. Omit this field entirely to leave existing\
            \ headers unchanged."
          example:
          - key: Content-Type
            value: application/json
          items:
            $ref: '#/components/schemas/HeaderEntry'
        queryParams:
          type: array
          description: "Replaces the complete list of query string parameters. Pass\
            \ a non-empty list to overwrite existing query params. Pass an empty list\
            \ [] to remove all query params. Omit this field entirely to leave existing\
            \ query params unchanged. Path variables are defined directly in the endpoint\
            \ URL using {{variable}} syntax — they do not need to be listed here."
          example:
          - key: status
            value: "{{status}}"
          items:
            $ref: '#/components/schemas/QueryParam'
        bodyParams:
          type: object
          description: "Replaces the request body payload. Pass a non-empty map to\
            \ overwrite the existing body. Supports {{variable}} placeholders in values.\
            \ Updating bodyParams triggers automatic re-extraction of {{variable}}\
            \ placeholders. Only applicable for POST, PUT, and PATCH requests."
          example:
            first_name: "{{firstName}}"
            email: "{{email}}"
      description: "Request body to partially update an existing tool. Only the fields\
        \ provided will be updated — omitted fields remain unchanged. When endpoint,\
        \ params, or bodyParams are updated, the tool's {{variable}} list is automatically\
        \ re-extracted and refreshed."
    IntegrationToolResponse:
      type: object
      properties:
        toolId:
          type: string
          description: Unique identifier for the tool
          example: tool-X9pLm2Wq8Rt3
        integrationId:
          type: string
          description: Unique identifier of the parent integration
          example: intg-AuUKK371Spr5
        name:
          type: string
          description: Human-readable name for this tool
          example: Get Order Details
        description:
          type: string
          description: Description of what this tool does
          example: Fetches order details from Shopify by order ID
        method:
          type: string
          description: HTTP method
          example: GET
        url:
          type: string
          description: Relative path of the API endpoint
          example: "/orders/{orderId}.json"
        scope:
          type: string
          description: Scope of the tool
          example: local
          enum:
          - local
          - community
        headers:
          $ref: '#/components/schemas/JsonNode'
        queryParams:
          $ref: '#/components/schemas/JsonNode'
        bodyParams:
          $ref: '#/components/schemas/JsonNode'
        createdAt:
          type: string
          description: Timestamp when the record was created
          format: date-time
        updatedAt:
          type: string
          description: Timestamp when the record was last updated
          format: date-time
    ExecuteToolRequest:
      type: object
      properties:
        placeholders:
          type: object
          description: "A map of placeholder names to values used to resolve {{placeholder}}\
            \ tokens in the tool's endpoint URL, query parameters, and request body\
            \ at runtime. Each placeholder used in the request must have a corresponding\
            \ entry in this map. Example: for endpoint '/customers/{{customerId}}.json',\
            \ provide {\"customerId\": \"7654321\"}."
          example:
            customerId: "7654321"
        authId:
          maxLength: 64
          minLength: 0
          type: string
          description: 'The authId of the credential set to use for this execution. '
          example: auth-P3kNz7Yv1Qm9
      description: "Request body to execute a tool against its configured third-party\
        \ API. Supply values for every {{variable}} placeholder declared in the tool's\
        \ endpoint, queryParams, and bodyParams. The tool's stored auth credentials\
        \ are resolved automatically — you do not need to pass credentials here."
    ExecuteToolResponse:
      type: object
      properties:
        toolId:
          type: string
          description: Unique identifier of the tool that was executed.
          example: tool-X9pLm2Wq8Rt3
        integrationId:
          type: string
          description: Unique identifier of the integration this tool belongs to.
          example: intg-AuUKK371Spr5
        url:
          type: string
          description: "The fully resolved URL that was called, with all {{variable}}\
            \ placeholders substituted."
          example: https://my-store.myshopify.com/admin/api/2024-01/customers/7654321.json
        method:
          type: string
          description: The HTTP method used for the request.
          example: GET
        statusCode:
          type: integer
          description: HTTP status code returned by the third-party API.
          format: int32
          example: 200
        success:
          type: boolean
          description: Whether the third-party API returned a 2xx success response.
          example: true
        responseBody:
          $ref: '#/components/schemas/JsonNode'
        responseHeaders:
          type: object
          description: Response headers returned by the third-party API.
          example:
            Content-Type: application/json; charset=utf-8
        errorMessage:
          type: string
          description: Error message when success is false — contains the raw error
            body or exception message.
          example: "404 Not Found: {\"errors\": \"Customer not found\"}"
        durationMs:
          type: integer
          description: "How long the third-party API took to respond, in milliseconds."
          format: int64
          example: 342
        executedAt:
          type: string
          description: Timestamp when the execution was triggered.
          format: date-time
          example: 2024-04-20T10:00:00Z
      description: Result of executing a tool against its configured third-party API.
    PaginatedResponseIntegrationToolResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/IntegrationToolResponse'
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalCounts:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean

    # Webhooks APIs Schemas
    CreateWebhookRequest:
