components:
  schemas:
    # Calls APIs Schemas
    CreateCallRequest:
      required:
      - fromPhoneNumber
      - toPhoneNumber
      type: object
      properties:
        fromPhoneNumber:
          pattern: "^\\+[1-9][0-9]{6,14}$"
          type: string
          description: The caller's phone number in E.164 format. Must be a number
            provisioned in or configured with SigmaMind.
          example: "+14155552671"
        toPhoneNumber:
          pattern: "^\\+[1-9][0-9]{6,14}$"
          type: string
          description: The callee's phone number in E.164 format.
          example: "+14155552671"
        agentId:
          maxLength: 64
          minLength: 0
          type: string
          description: The unique identifier of the Agent assigned to handle the outbound
            call.
          example: D5D0p7TUs66TTAEAx
        variables:
          type: object
          description: "Dynamic key-value pairs for Agent personalisation (e.g. customer\
            \ name, account details)."
          example:
            customer_name: Michael
    CallResponse:
      type: object
      properties:
        callId:
          type: string
          description: "A unique identifier for any call, whether inbound, outbound,\
            \ or web-based."
          example: call-AuUKK371Spr5nHJS
        callType:
          type: string
          description: Specifies the direction or type of the call.
          example: inbound
          enum:
          - "inbound, outbound, web"
        phoneNumber:
          $ref: '#/components/schemas/PhoneNumberResponse'
        # campaign:
        #   $ref: '#/components/schemas/CampaignResponse'
        status:
          type: string
          description: Status of the call
          example: ended
          enum:
          - "scheduled, in-progress, ended, not-connected, error"
        startTime:
          type: string
          description: Timestamp indicating when the call began.
          format: date-time
          example: 2021-04-20T10:00:00Z
        endTime:
          type: string
          description: Timestamp indicating when the call ended.
          format: date-time
          example: 2021-04-20T10:00:00Z
        duration:
          type: integer
          description: Total duration of the call in seconds.
          format: int32
          example: 120
        terminationReason:
          type: string
          description: Reason for call termination
          example: inactivity
          enum:
          - "customer_ended_call, agent_ended_call, inactivity, voicemail, busy, no-answer,\
            \ failed"
        createdAt:
          type: string
          description: The timestamp when the call record was created.
          format: date-time
          example: 2021-04-20T10:00:00Z
        updatedAt:
          type: string
          description: The timestamp when the call record was last updated.
          format: date-time
          example: 2021-04-20T10:00:00Z
        variables:
          $ref: '#/components/schemas/JsonNode'
        recordingUrl:
          type: string
          description: Recording URL of the call
          example: https://livekitmedia.blob.core.windows.net/recording-container-prod/room-ST_b88xWeWhaCVw-_+91XXXXXXXXXX_7d752295/recording.mp3
        agent:
          $ref: '#/components/schemas/AgentResponse'
    PaginatedResponseCallResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CallResponse'
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalCounts:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean

    # Chat APIs Schemas
    CreateChatRequest:
      required:
      - agentId
      - input
      type: object
      properties:
        agentId:
          maxLength: 64
          minLength: 1
          type: string
          description: The unique identifier of the Agent assigned to handle the chat
            completion.
          example: D5D0p7TUs66TTAEAx
        input:
          maxLength: 20480
          minLength: 1
          type: string
          description: Input message from the customer or conversation history.
          example: Where is my order?
        dynamicVariables:
          type: object
          description: "Dynamic key-value pairs required by the selected Agent for\
            \ personalisation (e.g. customer name, account details)."
          example:
            customer_name: Michael
        previousChatId:
          maxLength: 128
          minLength: 0
          type: string
          description: Unique ID of a previous chat session to use as context for
            this chat.
          example: chat-D5D0p7TUs66TTAEAx
    CreateChatCompletionRequest:
      required:
      - chatId
      - input
      type: object
      properties:
        chatId:
          maxLength: 128
          minLength: 1
          type: string
          description: The unique identifier of the chat session in a specific agent.
          example: chat-nZ9hHYAANJbhLwZv
        input:
          maxLength: 20480
          minLength: 1
          type: string
          description: Input message from the customer.
          example: Where is my order?
    UpdateChatRequest:
      type: object
      properties:
        agentId:
          maxLength: 64
          minLength: 0
          type: string
          description: The unique identifier of the Agent assigned to handle the chat
            completion.
          example: D5D0p7TUs66TTAEAx
        dynamicVariables:
          type: object
          description: "Dynamic key-value pairs required by the selected Agent for\
            \ personalisation (e.g. customer name, account details)."
          example:
            customer_name: Michael
    ChatCompletionResponse:
      type: object
      properties:
        chatId:
          type: string
          description: Unique identity for a chat
          example: chat-d17T6uReChpyfFeP
        createdAt:
          type: string
          description: The timestamp when the call record was created.
          format: date-time
          example: 2021-04-20T10:00:00Z
        status:
          type: string
          description: Status of the chat
          example: ended
          enum:
          - "in-progress, ended, error"
        response:
          type: array
          description: Agent response of the last user message
          example:
          - id: chat-item-G9YdhDqua0EngI1G
            role: assistant
            type: message
            content:
            - "Hello! My name is Grace, and I'm calling on behalf of SigmaMind AI.\
              \ Am I speaking with Michael?"
          items:
            $ref: '#/components/schemas/ChatMessage'
        agent:
          $ref: '#/components/schemas/AgentResponse'
    ChatMessage:
      type: object
      properties:
        id:
          type: string
          description: Unique identity for a chat message
          example: item-d17T6uReChpyfFeP
        role:
          type: string
          description: Role of the chat message
          example: user
          enum:
          - "user, assistant"
        type:
          type: string
          description: Type of the chat message
          example: message
          enum:
          - message
        content:
          type: array
          description: Chat message content
          example: "Hello! My name is Grace, and I'm calling on behalf of SigmaMind\
            \ AI. Am I speaking with Michael?"
          items:
            type: string
            description: Chat message content
            example: "Hello! My name is Grace, and I'm calling on behalf of SigmaMind\
              \ AI. Am I speaking with Michael?"
      description: Agent response of the last user message
      example:
      - id: chat-item-G9YdhDqua0EngI1G
        role: assistant
        type: message
        content:
        - "Hello! My name is Grace, and I'm calling on behalf of SigmaMind AI. Am\
          \ I speaking with Michael?"
    ChatResponse:
      type: object
      properties:
        chatId:
          type: string
          description: Unique identity for a chat
          example: chat-d17T6uReChpyfFeP
        agent:
          $ref: '#/components/schemas/AgentResponse'
        createdAt:
          type: string
          description: The timestamp when the call record was created.
          format: date-time
          example: 2021-04-20T10:00:00Z
        status:
          type: string
          description: Status of chat
          example: ended
        transcript:
          type: string
          description: transcript of the conversation in chat
        response:
          type: array
          description: Agent response of the last user message
          example:
          - id: chat-item-G9YdhDqua0EngI1G
            role: assistant
            type: message
            content:
            - "Hello! My name is Grace, and I'm calling on behalf of SigmaMind AI.\
              \ Am I speaking with Michael?"
          items:
            $ref: '#/components/schemas/ChatMessage'
        messages:
          type: array
          description: Agent response of the last user message
          example:
          - id: chat-item-G9YdhDqua0EngI1G
            role: assistant
            type: message
            content:
            - "Hello! My name is Grace, and I'm calling on behalf of SigmaMind AI.\
              \ Am I speaking with Michael?"
          items:
            $ref: '#/components/schemas/ChatMessage'
        dynamicVariables:
          $ref: '#/components/schemas/JsonNode'
    PaginatedResponseChatResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ChatResponse'
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalCounts:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean

    # Phone Number APIs Schemas
    CreatePhoneNumberRequest_Telephony:
      type: object
      properties:
        friendlyName:
          maxLength: 128
          minLength: 0
          type: string
          description: A user-friendly label for the phone number.
          example: My Phone Number
        countryCode:
          pattern: "^[A-Z]{2}$"
          type: string
          description: "ISO 3166-1 alpha-2 country code (e.g. 'US', 'IN'). Required\
            \ if phoneNumber is not provided."
          example: US
        areaCode:
          maximum: 99999
          minimum: 100
          type: integer
          description: Area/region code within the specified country for number selection.
          format: int32
          example: 415
        phoneNumber:
          pattern: "^\\+[1-9][0-9]{6,14}$"
          type: string
          description: "The exact phone number to purchase in E.164 format. If omitted,\
            \ a number is auto-selected based on countryCode and areaCode."
          example: "+14155552671"
        inboundAgentId:
          maxLength: 64
          minLength: 0
          type: string
          description: The inbound AI agent ID to associate with this phone number.
          example: awTw7UKhOsLGiDbt
        outboundAgentId:
          maxLength: 64
          minLength: 0
          type: string
          description: The outbound AI agent ID to associate with this phone number.
          example: awTw7UKhOsLGiDbt
        outboundPhoneNumber:
          pattern: "^\\+[1-9][0-9]{6,14}$"
          type: string
          description: "The outbound phone number in E.164 format, used for test calls."
          example: "+14155552671"
    ImportPhoneNumberRequest_Byo:
      required:
      - phoneNumber
      - terminationSipURI
      - trunkPassword
      - trunkUsername
      type: object
      properties:
        friendlyName:
          maxLength: 128
          minLength: 0
          type: string
          description: A user-friendly label for the phone number.
          example: My Phone Number
        phoneNumber:
          pattern: "^\\+[1-9][0-9]{6,14}$"
          type: string
          description: The phone number in E.164 format. Required when importing your
            own number.
          example: "+14155552671"
        inboundAgentId:
          maxLength: 64
          minLength: 0
          type: string
          description: The inbound AI agent ID to associate with this phone number.
          example: awTw7UKhOsLGiDbt
        outboundAgentId:
          maxLength: 64
          minLength: 0
          type: string
          description: The outbound AI agent ID to associate with this phone number.
          example: awTw7UKhOsLGiDbt
        trunkUsername:
          maxLength: 128
          minLength: 0
          type: string
          description: The trunk username for outbound calls. Must be set up in your
            provider account.
          example: username
        trunkPassword:
          maxLength: 128
          minLength: 0
          type: string
          description: The trunk password for outbound calls. Must be set up in your
            provider account.
          example: password
        terminationSipURI:
          maxLength: 253
          minLength: 0
          type: string
          description: "The SIP URI for terminating calls, provided by the telecom\
            \ provider."
          example: sip.telnyx.com
        outboundPhoneNumber:
          pattern: "^\\+[1-9][0-9]{6,14}$"
          type: string
          description: "The outbound phone number in E.164 format, used for test calls."
          example: "+14155552671"
    PhoneNumberResponse:
      type: object
      properties:
        sipPhoneNumber:
          type: string
          description: The caller’s phone number in E.164 format. This number must
            be obtained from SigmaMind or configured using SIP trunking with SigmaMind.
          example: "+14155552671"
        provider:
          type: string
          description: The service provider associated with the phone number.
          example: twilio
          enum:
          - "twilio, telnyx, byo"
        inboundAgentId:
          type: string
          description: Default agent ID assigned to handle inbound calls for this
            phone number.
          example: D5D0p7TUs66TTAEAx
        outboundAgentId:
          type: string
          description: Default agent ID assigned to handle outbound calls for this
            phone number.
          example: D5D0p7TUs66TTAEAx
        outboundPhoneNumber:
          type: string
          description: "The default outbound phone number of the callee, represented\
            \ in E.164 format"
          example: "+14155552671"
        active:
          type: boolean
          description: Indicates whether the phone number is currently active and
            available for use.
          example: true
        terminationSipURI:
          type: string
          description: "The SIP URI of the phone number, provided by the service provider\
            \ for call termination."
          example: sip.telnyx.com
        friendlyName:
          type: string
          description: A user-friendly display name assigned to this phone number.
          example: Support Line - US
    PhoneNumberResponse_Telephony:
      type: object
      properties:
        sipPhoneNumber:
          type: string
          description: The caller’s phone number in E.164 format. This number must
            be obtained from SigmaMind or configured using SIP trunking with SigmaMind.
          example: "+14155552671"
        provider:
          type: string
          description: The service provider associated with the phone number.
          example: twilio
          enum:
          - "twilio, telnyx, byo"
        inboundAgentId:
          type: string
          description: Default agent ID assigned to handle inbound calls for this
            phone number.
          example: D5D0p7TUs66TTAEAx
        outboundAgentId:
          type: string
          description: Default agent ID assigned to handle outbound calls for this
            phone number.
          example: D5D0p7TUs66TTAEAx
        outboundPhoneNumber:
          type: string
          description: "The default outbound phone number of the callee, represented\
            \ in E.164 format"
          example: "+14155552671"
        active:
          type: boolean
          description: Indicates whether the phone number is currently active and
            available for use.
          example: true
        friendlyName:
          type: string
          description: A user-friendly display name assigned to this phone number.
          example: Support Line - US
    PhoneNumberResponse_Byo:
      type: object
      properties:
        sipPhoneNumber:
          type: string
          description: The caller’s phone number in E.164 format. This number must
            be obtained from SigmaMind or configured using SIP trunking with SigmaMind.
          example: "+14155552671"
        inboundAgentId:
          type: string
          description: Default agent ID assigned to handle inbound calls for this
            phone number.
          example: D5D0p7TUs66TTAEAx
        outboundAgentId:
          type: string
          description: Default agent ID assigned to handle outbound calls for this
            phone number.
          example: D5D0p7TUs66TTAEAx
        outboundPhoneNumber:
          type: string
          description: "The default outbound phone number of the callee, represented\
            \ in E.164 format"
          example: "+14155552671"
        active:
          type: boolean
          description: Indicates whether the phone number is currently active and
            available for use.
          example: true
        terminationSipURI:
          type: string
          description: "The SIP URI of the phone number, provided by the service provider\
            \ for call termination."
          example: sip.telnyx.com
        friendlyName:
          type: string
          description: A user-friendly display name assigned to this phone number.
          example: Support Line - US
    UpdatePhoneNumberRequest:
      type: object
      properties:
        friendlyName:
          maxLength: 128
          minLength: 0
          type: string
          description: A user-friendly label for the phone number.
          example: Support Line
        inboundAgentId:
          maxLength: 64
          minLength: 0
          type: string
          description: The inbound AI agent ID associated with this phone number.
          example: awTw7UKhOsLGiDbt
        outboundAgentId:
          maxLength: 64
          minLength: 0
          type: string
          description: The outbound AI agent ID associated with this phone number.
          example: awTw7UKhOsLGiDbt
        terminationSipUri:
          maxLength: 253
          minLength: 0
          type: string
          description: "The SIP URI for terminating calls, provided by the telecom\
            \ provider."
          example: sip.telnyx.com
        trunkUsername:
          maxLength: 128
          minLength: 0
          type: string
          description: The username used for authenticating with the SIP trunk.
          example: sip_user_01
        trunkPassword:
          maxLength: 128
          minLength: 0
          type: string
          description: The password used for authenticating with the SIP trunk.
          example: P@ssw0rd123
        outboundPhoneNumber:
          pattern: "^\\+[1-9][0-9]{6,14}$"
          type: string
          description: "The outbound phone number in E.164 format, used for test calls."
          example: "+14155552671"
    PaginatedResponsePhoneNumberResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PhoneNumberResponse'
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalCounts:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean

    # Agent APIs Schemas
    CreateAgentRequest:
      required:
      - instructions
      type: object
      properties:
        agentName:
          maxLength: 128
          minLength: 0
          type: string
          description: The name of the agent.
          example: Auralis
        instructions:
          type: string
          description: "Instructional prompt provided to the agent to guide its behavior,\
            \ tone, and task execution."
          example: You are a helpful customer support assistant. Answer concisely
            and professionally.
        welcomeMessageType:
          type: string
          description: Specifies whether the welcome message is static or dynamically
            generated from a prompt.
          example: static
          default: static
          enum:
          - static
          - prompt
        welcomeMessage:
          type: string
          description: "The content of the welcome message. If 'welcomeMessageType'\
            \ is 'static', this contains the exact message shown to the user. If it\
            \ is 'prompt', this contains the prompt used to generate the welcome message\
            \ dynamically."
          example: Welcome to our service! How can I assist you today?
        agentSettings:
          $ref: '#/components/schemas/CreateAgentSettingsRequest'
    CreateAgentSettingsRequest:
      type: object
      properties:
        language:
          type: string
          description: The language your customers will primarily speak during calls.
          example: en_US
          default: en_US
          enum:
          - multi_nova3
          - multi_nova2 
          - en
          - en_US
          - en_AU
          - en_GB
          - en_NZ
          - en_IN
          - hi
          - de
          - de_CH
          - nl
          - sv
          - sv_SE
          - da
          - da_DK
          - es
          - es_419
          - fr
          - fr_CA
          - pt
          - pt_BR
          - pt_PT
          - it
          - tr
          - no
          - id
          - bg
          - ca
          - zh
          - zh_CN
          - zh_Hans
          - zh_TW
          - zh_Hant
          - zh_HK
          - cs
          - et
          - fi
          - nl_BE
          - el
          - hu
          - ja
          - ko
          - ko_KR
          - lv
          - lt
          - ms
          - pl
          - ro
          - ru
          - sk
          - th
          - th_TH
          - uk
          - vi
        aiStartsConversation:
          type: boolean
          description: "If true the AI agent will initiate the conversation immediately\
            \ when the call connects. If false the call will connect silently, waiting\
            \ for the customer to speak first before the AI responds"
          example: true
          default: true
        backgroundSound:
          type: string
          description: Add ambient background audio during the call.
          example: keyboard_typing
          default: none
          enum:
          - keyboard_typing
          - office_ambience
          - none
        interruptionSensitivity:
          maximum: 1.0
          exclusiveMaximum: false
          minimum: 0.01
          exclusiveMinimum: false
          type: number
          description: "Controls how sensitive the speech output is to user interruptions.\
            \ Lower values make the agent less likely to stop speaking when interrupted,\
            \ while higher values make it more responsive to interruptions."
          format: double
          example: 0.05
          default: 0.05
        globalPrompt:
          type: string
          description: "A global system prompt that is applied to every conversation\
            \ to define the agent’s overall behavior, tone, and constraints."
          example: You are a professional virtual assistant. Always respond politely
            and keep answers concise.
        endCallOnSilenceDuration:
          maximum: 30
          minimum: 1
          type: number
          description: Specifies the duration of continuous silence (in minutes) after
            which the call will be automatically ended.
          format: float
          example: 30
          default: 5
        maxCallDuration:
          maximum: 120
          minimum: 1
          type: integer
          description: Maximum call duration in minutes before the call is automatically
            terminated.
          format: int32
          example: 40
          default: 60
        llmModel:
          type: string
          description: The language model that powers the AI's responses.
          example: gpt-4o-mini
          default: gpt-4o-mini
        voiceId:
          type: string
          description: This is the AI's speaking voice id.
          example: elevenlabs_SGbOfpm28edC83pZ9iGb
          default: elevenlabs_EXAVITQu4vr4xnSDxMaL
        voiceModelId:
          type: string
          description: This is the AI's text to speech engine version.
          example: eleven_turbo_v2_5
          default: eleven_turbo_v2_5
        enablePostConversationInsights:
          type: boolean
          description: Indicates whether post-conversation analysis should be performed
            to extract insights after the conversation ends.
          example: true
          default: false
        postConversationInsightsLlmModel:
          type: string
          description: The language model that powers the AI's post-conversation analysis.
          example: gpt-4o-mini
          default: gpt-4o-mini
        webhooks:
          type: array
          description: List of webhook configurations that define external endpoints
            to be notified on specific events.
          items:
            $ref: '#/components/schemas/WebhookConfig'
        postConversationInsights:
          type: array
          description: List of configurations defining what insights should be extracted
            after the conversation ends.
          items:
            $ref: '#/components/schemas/PostConversationInsightsRequest'
      description: Configuration settings that control the agent's runtime behavior.
    PostConversationInsightsRequest:
      required:
      - analysisInstructions
      - dataType
      - insightName
      type: object
      properties:
        insightName:
          type: string
          description: A Unique name of the insight that will be generated from the
            conversation.
          example: conversation summary
        analysisInstructions:
          type: string
          description: Instructions or prompt that define how the insight should be
            generated from the conversation.
        dataType:
          pattern: string|boolean|number|selector
          type: string
          description: Defines the expected data type of the generated insight result.
          example: string
          enum:
          - string
          - boolean
          - number
          - selector
        options:
          type: array
          description: List of allowed selectable values. Required only when dataType
            is selector.
          example:
          - Interested
          - Not Interested
          - Follow Up Later
          items:
            type: string
            description: List of allowed selectable values. Required only when dataType
              is selector.
            example: "[\"Interested\",\"Not Interested\",\"Follow Up Later\"]"
      description: List of configurations defining what insights should be extracted
        after the conversation ends.
    WebhookConfig:
      required:
      - name
      - url
      type: object
      properties:
        name:
          type: string
          description: The display name of the webhook for easy identification.
          example: My Webhook
        url:
          pattern: https?://.+
          type: string
          description: The HTTPS endpoint to which the webhook payload will be sent.
            Must be a valid HTTPS URL.
          example: https://example.com/webhook
        events:
          uniqueItems: true
          type: array
          description: List of events that will trigger the webhook. Each event name
            corresponds to a specific type of activity in the system.
          items:
