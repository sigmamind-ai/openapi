    # Test Case APIs Schemas
    CreateTestCaseRequest:
      required:
      - agentId
      - successCriteria
      - userPrompt
      type: object
      properties:
        label:
          type: string
          description: "A human-readable name or label for the test case, used to\
            \ identify it in reports and dashboards."
          example: Angry Customer - Cancellation Flow
        agentId:
          type: string
          description: The unique identifier of the Agent that will respond during
            the chat simulation.
          example: D5D0p7TUs66TTAEAx
        llmModel:
          type: string
          description: "The LLM model used to generate Agent responses during the\
            \ simulation. To use OpenAI priority tier models, append '-fast-tier'\
            \ to the model name (e.g., 'gpt-4o-mini-fast-tier')."
          example: gpt-4o-mini
        mockData:
          type: array
          description: A list of mock variables that substitute for real external
            data sources during the simulation. Each entry defines a variable name
            and its simulated value.
          example:
          - variableName: customer_name
            value: John Doe
          - variableName: account_status
            value: active
          items:
            $ref: '#/components/schemas/MockDataRequest'
        userPrompt:
          type: string
          description: A prompt that defines the persona and intent of the simulated
            user. This drives the user-side messages throughout the conversation.
          example: You are an angry customer who wants to cancel their subscription.
        attempt:
          type: integer
          description: The number of times this test case should be executed. Each
            run is an independent simulation. Defaults to 1.
          format: int64
          example: 5
        successCriteria:
          type: string
          description: A plain-language description of what a successful agent response
            looks like. Used to evaluate the agent's performance after each simulation
            run.
          example: "The agent should acknowledge the cancellation request, present\
            \ retention alternatives, and confirm the cancellation if the customer\
            \ insists."
